<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic Pricing Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="panel controls-panel">
      <h1>Dynamic Pricing System</h1>
      <p class="subtitle">Run a 30-step simulation and view price behavior over time.</p>

      <div class="control-row">
        <label for="initialPrice">Initial Price (enter value between 10 and 100)</label>
        <input id="initialPrice" type="number" min="10" max="100"/>
      </div>

      <button id="startBtn" type="button">Start Simulation</button>
      <p id="statusText" class="status">Ready.</p>
    </section>

    <section class="panel chart-panel">
      <h2>Price Over Time</h2>
      <canvas id="priceChart" width="800" height="300" aria-label="Price line chart"></canvas>
    </section>

    <section class="panel table-panel">
      <h2>Simulation Steps</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Step</th>
              <th>Price</th>
              <th>Demand</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
